        </nav>

  </div>

  <script>
    const PER_PAGE = 6;
    const cards    = Array.from(document.querySelectorAll('.card'));
    const grid     = document.querySelector('.galeria_grid');
    const prevBtn  = document.querySelector('.prev_page');
    const nextBtn  = document.querySelector('.next_page');
    const numWrap  = document.querySelector('.page_numbers');

    const total = Math.ceil(cards.length / PER_PAGE);
    let current = 1;

    function buildNumbers() {
      numWrap.innerHTML = '';
      for (let i = 1; i <= total; i++) {
        const btn = document.createElement('button');
        btn.className = 'page_btn' + (i === current ? ' active' : '');
        btn.textContent = i;
        btn.setAttribute('aria-label', `Página ${i}`);
        btn.addEventListener('click', () => goTo(i));
        numWrap.appendChild(btn);
      }
    }

    function goTo(page) {
      current = page;
      const start = (current - 1) * PER_PAGE;

      cards.forEach((card, i) => {
        card.style.display = (i >= start && i < start + PER_PAGE) ? '' : 'none';
      });

      prevBtn.disabled = current === 1;
      nextBtn.disabled = current === total;
      buildNumbers();
      grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    prevBtn.addEventListener('click', () => { if (current > 1)     goTo(current - 1); });
    nextBtn.addEventListener('click', () => { if (current < total) goTo(current + 1); });

    goTo(1);
  </script>
